name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libsqlite3-dev lldd lld openjdk-17-jdk shared-mime-info
        pip install --upgrade pip
        pip install buildozer cython git+https://github.com/kivy/kivy.git@master

    - name: Initialize Buildozer
      run: buildozer init

    - name: Configure buildozer.spec
      run: |
        sed -i 's/# requirements = python3,kivy/requirements = python3,kivy==master,numpy,matplotlib,pydantic/g' buildozer.spec
        sed -i 's/android.archs = arm64-v8a/android.archs = armeabi-v7a/g' buildozer.spec

    - name: Build with Buildozer
      run: buildozer android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: package
        path: bin/*.apk
