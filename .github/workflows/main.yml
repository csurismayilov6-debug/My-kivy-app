name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - run: |
        pip install buildozer
        buildozer android debug
    - uses: actions/upload-artifact@v4
      with:
        name: package
        path: bin/*.apk
