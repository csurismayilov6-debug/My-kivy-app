name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev
          python -m pip install --upgrade pip
          pip install --upgrade buildozer cython

      - name: Force Install Platform
        run: |
          # Buildozer-in axtardığı yolu məcburi yaradırıq
          mkdir -p .buildozer/android/platform
          cd .buildozer/android/platform
          git clone https://github.com/kivy/python-for-android.git
          cd python-for-android
          # Lazımi kitabxanaları quraşdırırıq
          pip install -e .

      - name: Build with Buildozer
        run: |
          export BUILDOZER_ACCEPT_SDK=1
          # Buradakı -v komandası detallı log verir
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-apk
          path: bin/*.apk
