name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-20.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libsqlite3-dev lld openjdk-17-jdk shared-mime-info
        pip install --upgrade pip
        pip install "cython<3.0.0"
        pip install kivy matplotlib numpy pydantic buildozer

    - name: Initialize Buildozer
      run: |
        python3 -m buildozer init
        sed -i 's/# android.accept_sdk_license = False/android.accept_sdk_license = True/g' buildozer.spec

    - name: Configure buildozer.spec
      run: |
        sed -i 's/# requirements = python3,kivy/requirements = python3,kivy,numpy,matplotlib,pydantic/g' buildozer.spec
        sed -i 's/android.archs = arm64-v8a/android.archs = armeabi-v7a/g' buildozer.spec
        echo "android.copy_libs = 1" >> buildozer.spec

    - name: Build with Buildozer
      run: |
        rm -rf .buildozer/android/platform/build-*
        python3 -m buildozer android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: package
        path: bin/*.apk
