name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev
          python -m pip install --upgrade pip
          pip install --upgrade buildozer cython

      - name: Prepare build environment
        run: |
          # Buildozer üçün lazım olan qovluq strukturunu əvvəlcədən yaradırıq
          mkdir -p .buildozer/android/platform
          # python-for-android-ü birbaşa klonlayırıq ki, fayl tapılmama xətası olmasın
          git clone https://github.com/kivy/python-for-android.git .buildozer/android/platform/python-for-android

      - name: Build with Buildozer
        run: |
          # SDK lisenziyalarını avtomatik qəbul edirik
          export BUILDOZER_ACCEPT_SDK=1
          # Build prosesini başlat
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-apk
          path: bin/*.apk
