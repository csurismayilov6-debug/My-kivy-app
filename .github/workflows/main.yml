name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev
          python -m pip install --upgrade pip
          pip install --upgrade buildozer cython

      - name: Build with Buildozer
        run: |
          # SDK və NDK üçün bütün lisenziyaları avtomatik təsdiqləyirik
          export BUILDOZER_ACCEPT_SDK=1
          
          # 1. Əvvəlcə mühiti təmizləyirik
          buildozer android clean
          
          # 2. Build prosesi
          # Burada vacib məqam: -v bayrağı ilə logları tam alırıq
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-apk
          path: bin/*.apk

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: .buildozer/logs/
